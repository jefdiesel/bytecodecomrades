<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>uPEG — every unicorn (live + archive)</title>
<meta name="description" content="Live + cached gallery of every uPEG unicorn ever seen. Burned unicorns survive in your local archive.">
<link rel="icon" href="/favicon.svg">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 20px 24px 80px; background: #0b0c10; color: #e8e8e8;
         font: 13px ui-monospace, "SF Mono", Menlo, monospace; }
  header { margin: 0 0 16px; }
  h1 { font-size: 16px; margin: 0 0 6px; font-weight: 600; }
  .sub { color: #8a8f99; font-size: 12px; }
  .sub a { color: #6cf; text-decoration: none; }
  .sub a:hover { text-decoration: underline; }
  #status { color: #8a8f99; font-size: 12px; margin: 0 0 12px; min-height: 16px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 16px;
             font-size: 12px; align-items: center; }
  .toolbar button { background: #1d2026; color: #e8e8e8; border: 1px solid #2a2e36;
                    padding: 5px 10px; border-radius: 3px; cursor: pointer;
                    font: inherit; }
  .toolbar button:hover { background: #262a32; }
  .toolbar button.on { background: #2a3548; border-color: #3d5277; }
  .toolbar .pill { color: #8a8f99; padding: 5px 8px; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
          gap: 6px; }
  .cell { aspect-ratio: 1; background: #16181d; border-radius: 3px;
          position: relative; overflow: hidden; cursor: pointer; }
  .cell svg { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  .cell .tag { position: absolute; bottom: 2px; right: 4px; font-size: 9px;
               color: #fff; opacity: .55; mix-blend-mode: difference; pointer-events: none; }
  .cell.burned svg { opacity: .35; filter: grayscale(.7); }
  .cell.burned::after {
    content: "🔥"; position: absolute; top: 4px; left: 4px; font-size: 12px;
    text-shadow: 0 0 6px #000; pointer-events: none;
  }
  .skeleton { background: linear-gradient(90deg,#16181d,#1d2026,#16181d);
              background-size: 200% 100%; animation: sk 1.4s infinite; }
  @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  #sentinel { height: 60px; margin: 24px 0 0; color: #666; text-align: center;
              font-size: 12px; line-height: 60px; }
  .filter-hidden { display: none !important; }
  /* modal */
  #modal { position: fixed; inset: 0; background: #000c; display: none;
           align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  #modal.on { display: flex; }
  #modal .box { background: #16181d; border-radius: 6px; padding: 18px;
                max-width: 440px; width: 100%; }
  #modal .art { width: 100%; aspect-ratio: 1; image-rendering: pixelated;
                background: #0b0c10; border-radius: 4px; margin-bottom: 12px; }
  #modal .meta { font-size: 12px; color: #ccc; word-break: break-all; line-height: 1.7; }
  #modal .meta b { color: #fff; }
  #modal .meta a { color: #6cf; text-decoration: none; }
  #modal .x { float: right; color: #888; cursor: pointer; padding: 0 4px; }
</style>
</head>
<body>

<header>
  <h1>uPEG unicorns — live state + your local archive of burned ones</h1>
  <div class="sub">
    rendered from
    <a href="https://etherscan.io/address/0x44b28991b167582f18ba0259e0173176ca125505" target="_blank" rel="noopener">token</a>
    +
    <a href="https://etherscan.io/address/0xe54082DfBf044B6a8F584bdDdb90a22d5613C440" target="_blank" rel="noopener">hook</a>
    · burned unicorns are preserved in IndexedDB on your device
  </div>
</header>
<div id="status">connecting…</div>
<div class="toolbar">
  <button id="filterAll" class="on">all</button>
  <button id="filterAlive">alive</button>
  <button id="filterBurned">burned 🔥</button>
  <span class="pill" id="counts"></span>
  <button id="export" style="margin-left:auto">export json</button>
  <button id="clearCache">clear cache</button>
</div>
<div id="grid"></div>
<div id="sentinel">scroll for more</div>

<div id="modal" onclick="if(event.target.id==='modal')this.classList.remove('on')">
  <div class="box">
    <span class="x" onclick="document.getElementById('modal').classList.remove('on')">✕</span>
    <div class="art" id="modalArt"></div>
    <div class="meta" id="modalMeta"></div>
  </div>
</div>

<script type="module">
import { Interface } from "https://esm.sh/ethers@6.13.4";

const RPC   = "/api/rpc?chain=eth-mainnet";
const TOKEN = "0x44b28991b167582f18ba0259e0173176ca125505";
const HOOK  = "0xe54082DfBf044B6a8F584bdDdb90a22d5613C440";
const PAGE_TARGET  = 100;
const HOLDER_BATCH = 10;

const tokenI = new Interface([
  "function HoldersCount() view returns (uint256)",
  "function Holder(uint256) view returns (address)",
  "function UpegsTotalCount() view returns (uint256)",
  "function OwnerUpegsCount(address) view returns (uint256)",
  "function OwnerUpegsPage(address,uint256,uint256) view returns (tuple(uint256,uint256)[])"
]);
const hookI = new Interface([
  "function generate(uint256) view returns (string)"
]);

// ---------- RPC ----------
let rpcId = 0;
async function call(to, data) {
  const res = await fetch(RPC, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ jsonrpc:"2.0", id: ++rpcId, method:"eth_call",
                           params:[{ to, data }, "latest"] })
  });
  const j = await res.json();
  if (j.error) throw new Error(j.error.message || JSON.stringify(j.error));
  return j.result;
}
async function pmap(items, n, fn) {
  const out = new Array(items.length);
  let i = 0;
  await Promise.all(Array.from({ length: Math.min(n, items.length) }, async () => {
    while (i < items.length) {
      const k = i++;
      try { out[k] = await fn(items[k], k); }
      catch (e) { out[k] = { _err: e }; }
    }
  }));
  return out;
}

// ---------- IndexedDB archive ----------
const DB_NAME = "upeg-archive";
const STORE = "unicorns";
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(STORE, { keyPath: "id" });
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function dbGetAll(db) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readonly");
    const r = tx.objectStore(STORE).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function dbPut(db, item) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(item);
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
function dbBulkPut(db, items) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    const s = tx.objectStore(STORE);
    for (const it of items) s.put(it);
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
function dbUpdate(db, id, patch) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    const s = tx.objectStore(STORE);
    const g = s.get(id);
    g.onsuccess = () => {
      const cur = g.result;
      if (!cur) return res();
      Object.assign(cur, patch);
      s.put(cur);
    };
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
function dbClear(db) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).clear();
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}

// ---------- DOM ----------
const $status = document.getElementById("status");
const $grid   = document.getElementById("grid");
const $sent   = document.getElementById("sentinel");
const $modal  = document.getElementById("modal");
const $mArt   = document.getElementById("modalArt");
const $mMeta  = document.getElementById("modalMeta");
const $counts = document.getElementById("counts");

const $fAll = document.getElementById("filterAll");
const $fAlive = document.getElementById("filterAlive");
const $fBurned = document.getElementById("filterBurned");
const $export = document.getElementById("export");
const $clear = document.getElementById("clearCache");

// ---------- state ----------
let db;
let holdersCount = 0, totalEverMinted = 0;
let nextHolderIdx = 0, totalRendered = 0;
let loading = false, scanComplete = false;
let liveAlive = new Set();   // ids confirmed alive in this scan
let cellsById = new Map();   // id -> {div, record}
let filter = "all";

function fmtAddr(a) { return a.slice(0,6) + "…" + a.slice(-4); }
function fmtTime(t) { return new Date(t).toLocaleString(); }

function openModal({ id, seed, svg, holder, status, firstSeenAt, lastSeenAt }) {
  $mArt.innerHTML = svg || "";
  $mMeta.innerHTML =
    `<b>uPEG #${id}</b> · ${status === "burned" ? "🔥 burned" : "alive"}<br>` +
    (status === "burned"
      ? `last seen with <a href="https://etherscan.io/address/${holder}" target="_blank" rel="noopener">${fmtAddr(holder)}</a><br>`
      : `held by <a href="https://etherscan.io/address/${holder}" target="_blank" rel="noopener">${fmtAddr(holder)}</a><br>`) +
    `seed: <span style="font-size:10px">${seed}</span><br>` +
    `first cached: ${fmtTime(firstSeenAt)}<br>` +
    `last seen: ${fmtTime(lastSeenAt)}`;
  $modal.classList.add("on");
}

function applyFilter() {
  for (const { div, record } of cellsById.values()) {
    const show =
      filter === "all" ||
      (filter === "alive" && record.status === "alive") ||
      (filter === "burned" && record.status === "burned");
    div.classList.toggle("filter-hidden", !show);
  }
}

function refreshCounts() {
  let alive = 0, burned = 0;
  for (const { record } of cellsById.values()) {
    if (record.status === "alive") alive++; else burned++;
  }
  $counts.textContent = `${alive.toLocaleString()} alive · ${burned.toLocaleString()} burned`;
}

function renderCell(record) {
  const existing = cellsById.get(record.id);
  if (existing) {
    existing.record = record;
    existing.div.classList.toggle("burned", record.status === "burned");
    if (record.svg && !existing.div._hasSvg) {
      existing.div.innerHTML = record.svg + `<span class="tag">#${record.id}</span>`;
      existing.div._hasSvg = true;
    }
    return existing.div;
  }
  const div = document.createElement("div");
  div.className = "cell" + (record.svg ? "" : " skeleton") + (record.status === "burned" ? " burned" : "");
  div.dataset.id = record.id;
  div.title = `#${record.id} · ${fmtAddr(record.holder)}`;
  div.innerHTML = (record.svg || "") + `<span class="tag">#${record.id}</span>`;
  div._hasSvg = !!record.svg;
  div.addEventListener("click", () => openModal(record));
  $grid.appendChild(div);
  cellsById.set(record.id, { div, record });
  return div;
}

// ---------- bootstrap ----------
async function init() {
  try {
    db = await openDB();
  } catch (e) {
    $status.textContent = "IndexedDB unavailable: " + e.message;
    return;
  }

  // 1. paint cached cells immediately so users see something even offline
  const cached = await dbGetAll(db);
  cached.sort((a, b) => a.id - b.id);
  $status.textContent = `loading ${cached.length.toLocaleString()} from local archive…`;
  for (const c of cached) renderCell({ ...c, status: "burned" }); // tentatively, until live scan reverifies
  refreshCounts();

  // 2. on-chain header info
  const [hc, total] = await Promise.all([
    call(TOKEN, tokenI.encodeFunctionData("HoldersCount")),
    call(TOKEN, tokenI.encodeFunctionData("UpegsTotalCount"))
  ]);
  holdersCount    = Number(tokenI.decodeFunctionResult("HoldersCount", hc)[0]);
  totalEverMinted = Number(tokenI.decodeFunctionResult("UpegsTotalCount", total)[0]);
  $status.textContent =
    `${holdersCount.toLocaleString()} holders · ${totalEverMinted.toLocaleString()} unicorns ever minted · ${cached.length.toLocaleString()} in local archive`;

  await loadMore();
}

async function loadMore() {
  if (loading || scanComplete) return;
  loading = true;

  const startCount = totalRendered;
  while (totalRendered - startCount < PAGE_TARGET && nextHolderIdx < holdersCount) {
    const sliceEnd = Math.min(nextHolderIdx + HOLDER_BATCH, holdersCount);
    const idxs = Array.from({ length: sliceEnd - nextHolderIdx }, (_, k) => nextHolderIdx + k);
    nextHolderIdx = sliceEnd;
    $status.textContent =
      `${totalRendered} new this scan · holders ${idxs[0]}…${idxs.at(-1)} of ${holdersCount}`;

    const holders = (await pmap(idxs, HOLDER_BATCH, async i => {
      const r = await call(TOKEN, tokenI.encodeFunctionData("Holder", [i]));
      return tokenI.decodeFunctionResult("Holder", r)[0];
    })).filter(a => a && /^0x[0-9a-f]{40}$/i.test(a) &&
                    a !== "0x0000000000000000000000000000000000000000");
    if (holders.length === 0) continue;

    const pages = await pmap(holders, HOLDER_BATCH, async h => {
      const r = await call(TOKEN, tokenI.encodeFunctionData("OwnerUpegsPage", [h, 0, 100]));
      return tokenI.decodeFunctionResult("OwnerUpegsPage", r)[0];
    });

    const pairs = [];
    for (let i = 0; i < holders.length; i++) {
      const arr = pages[i];
      if (!arr || arr._err) continue;
      for (const u of arr) pairs.push({ id: Number(u[0]), seed: u[1].toString(), holder: holders[i] });
    }
    if (pairs.length === 0) continue;

    // For each live unicorn: mark alive, render/cache SVG if new
    const now = Date.now();
    for (const p of pairs) liveAlive.add(p.id);

    // figure out which need SVG fetched (not already in cellsById with svg)
    const needSvg = pairs.filter(p => {
      const existing = cellsById.get(p.id);
      return !existing || !existing.record.svg;
    });

    const svgs = await pmap(needSvg, HOLDER_BATCH, async p => {
      try {
        const r = await call(HOOK, hookI.encodeFunctionData("generate", [p.seed]));
        return hookI.decodeFunctionResult("generate", r)[0];
      } catch (e) { return null; }
    });

    const svgById = new Map();
    needSvg.forEach((p, i) => svgById.set(p.id, svgs[i]));

    // build records, render, cache
    const toCache = [];
    for (const p of pairs) {
      const existing = cellsById.get(p.id);
      const svg = existing?.record?.svg || svgById.get(p.id);
      const record = {
        id: p.id,
        seed: p.seed,
        svg,
        holder: p.holder,
        status: "alive",
        firstSeenAt: existing?.record?.firstSeenAt || now,
        lastSeenAt: now
      };
      renderCell(record);
      if (!existing || existing.record.status !== "alive" || existing.record.holder !== p.holder) {
        toCache.push(record);
      }
    }
    if (toCache.length) await dbBulkPut(db, toCache);

    totalRendered += pairs.length;
    refreshCounts();
    applyFilter();
  }

  if (nextHolderIdx >= holdersCount && !scanComplete) {
    scanComplete = true;
    // Anything cached but not seen this scan = burned since last visit
    const burnedNow = [];
    for (const [id, { record }] of cellsById) {
      if (!liveAlive.has(id) && record.status !== "burned") {
        record.status = "burned";
        burnedNow.push({ ...record, status: "burned", lastSeenAt: record.lastSeenAt });
      }
    }
    if (burnedNow.length) await dbBulkPut(db, burnedNow);
    for (const { div, record } of cellsById.values()) {
      div.classList.toggle("burned", record.status === "burned");
    }
    refreshCounts();
    applyFilter();
    $sent.textContent = `✓ scan complete — ${liveAlive.size.toLocaleString()} alive · ${cellsById.size - liveAlive.size} burned in archive`;
  } else {
    $status.textContent =
      `${liveAlive.size.toLocaleString()} alive seen · ${holdersCount - nextHolderIdx} holders left to scan`;
  }
  loading = false;
}

// ---------- toolbar ----------
function setFilter(name) {
  filter = name;
  for (const b of [$fAll, $fAlive, $fBurned]) b.classList.remove("on");
  ({ all: $fAll, alive: $fAlive, burned: $fBurned })[name].classList.add("on");
  applyFilter();
}
$fAll.onclick = () => setFilter("all");
$fAlive.onclick = () => setFilter("alive");
$fBurned.onclick = () => setFilter("burned");

$export.onclick = async () => {
  const all = await dbGetAll(db);
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `upeg-archive-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

$clear.onclick = async () => {
  if (!confirm("delete all cached unicorns from this browser?")) return;
  await dbClear(db);
  for (const { div } of cellsById.values()) div.remove();
  cellsById.clear();
  liveAlive.clear();
  scanComplete = false;
  nextHolderIdx = 0;
  totalRendered = 0;
  refreshCounts();
  $sent.textContent = "scroll for more";
  await loadMore();
};

// ---------- scroll ----------
const io = new IntersectionObserver(es => { if (es.some(e => e.isIntersecting)) loadMore(); },
                                    { rootMargin: "400px 0px" });
io.observe($sent);

init().catch(e => { $status.textContent = "error: " + e.message; });
</script>
</body>
</html>
