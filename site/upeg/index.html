<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>uPEG — every unicorn (live + archive)</title>
<meta name="description" content="Live + cached gallery of every uPEG unicorn ever seen. Burned unicorns survive in your local archive.">
<link rel="icon" href="/favicon.svg">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 20px 24px 80px; background: #0b0c10; color: #e8e8e8;
         font: 13px ui-monospace, "SF Mono", Menlo, monospace; }
  header { margin: 0 0 16px; }
  h1 { font-size: 16px; margin: 0 0 6px; font-weight: 600; }
  .sub { color: #8a8f99; font-size: 12px; }
  .sub a { color: #6cf; text-decoration: none; }
  .sub a:hover { text-decoration: underline; }
  #status { color: #8a8f99; font-size: 12px; margin: 0 0 12px; min-height: 16px; word-break: break-all; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 12px;
             font-size: 12px; align-items: center; }
  .toolbar button, .toolbar input { background: #1d2026; color: #e8e8e8; border: 1px solid #2a2e36;
                    padding: 5px 10px; border-radius: 3px; cursor: pointer;
                    font: inherit; }
  .toolbar input { cursor: text; min-width: 380px; }
  .toolbar button:hover { background: #262a32; }
  .toolbar button.on { background: #2a3548; border-color: #3d5277; }
  .toolbar .pill { color: #8a8f99; padding: 5px 8px; }
  .walletbar { display: flex; gap: 8px; margin: 0 0 16px; align-items: center; flex-wrap: wrap; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
          gap: 6px; }
  .cell { aspect-ratio: 1; background: #16181d; border-radius: 3px;
          position: relative; overflow: hidden; cursor: pointer; }
  .cell svg { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  .cell .tag { position: absolute; bottom: 2px; right: 4px; font-size: 9px;
               color: #fff; opacity: .55; mix-blend-mode: difference; pointer-events: none; }
  .cell.burned svg { opacity: .35; filter: grayscale(.7); }
  .cell.burned::after {
    content: "🔥"; position: absolute; top: 4px; left: 4px; font-size: 12px;
    text-shadow: 0 0 6px #000; pointer-events: none;
  }
  .skeleton { background: linear-gradient(90deg,#16181d,#1d2026,#16181d);
              background-size: 200% 100%; animation: sk 1.4s infinite; }
  @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  #sentinel { height: 60px; margin: 24px 0 0; color: #666; text-align: center;
              font-size: 12px; line-height: 60px; }
  .filter-hidden { display: none !important; }
  #modal { position: fixed; inset: 0; background: #000c; display: none;
           align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  #modal.on { display: flex; }
  #modal .box { background: #16181d; border-radius: 6px; padding: 18px;
                max-width: 440px; width: 100%; }
  #modal .art { width: 100%; aspect-ratio: 1; image-rendering: pixelated;
                background: #0b0c10; border-radius: 4px; margin-bottom: 12px; }
  #modal .meta { font-size: 12px; color: #ccc; word-break: break-all; line-height: 1.7; }
  #modal .meta b { color: #fff; }
  #modal .meta a { color: #6cf; text-decoration: none; }
  #modal .x { float: right; color: #888; cursor: pointer; padding: 0 4px; }
</style>

<body>

    rendered from

<div id="modal" onclick="if(event.target.id==='modal')this.classList.remove('on')">

        mint as ethscription

      <button id="resetWallet" style="background:transparent;color:#888;border:none;padding:4px 0;font:inherit;font-size:10px;cursor:pointer;text-decoration:underline">change wallet</button>
    </div>
  </div>

<script>
"use strict";

const RPC   = "/api/rpc?chain=eth-mainnet";
const TOKEN = "0x44b28991b167582f18ba0259e0173176ca125505";
const HOOK  = "0xe54082DfBf044B6a8F584bdDdb90a22d5613C440";
const PAGE_TARGET  = 100;
const HOLDER_BATCH = 8;

// --- precomputed function selectors ---
const SEL = {
  HoldersCount:    "0x8c979559",
  Holder:          "0x1a773210",
  UpegsTotalCount: "0xd396bbff",
  OwnerUpegsCount: "0x067b2601",
  OwnerUpegsPage:  "0x407d4fb4",
  generate:        "0x4a7dd523"
};

// --- ABI helpers (hand-rolled, no ethers) ---
function pad32(hex) {
  hex = hex.replace(/^0x/, "").toLowerCase();
  return hex.padStart(64, "0");
}
function uintToHex(n) { return pad32(BigInt(n).toString(16)); }
function addrToHex(a) { return pad32(a.replace(/^0x/, "").toLowerCase()); }

function encodeUint(n)              { return uintToHex(n); }
function encodeAddress(a)           { return addrToHex(a); }
function callOwnerUpegsPage(a,p,s)  { return SEL.OwnerUpegsPage + encodeAddress(a) + encodeUint(p) + encodeUint(s); }
function callHolder(i)              { return SEL.Holder + encodeUint(i); }
function callOwnerUpegsCount(a)     { return SEL.OwnerUpegsCount + encodeAddress(a); }
function callGenerate(seed)         { return SEL.generate + pad32(BigInt(seed).toString(16)); }

function decodeUint(hex)    { return BigInt(hex); }
function decodeAddress(hex) { return "0x" + hex.replace(/^0x/, "").slice(-40); }

// decode (uint256,uint256)[] returned by OwnerUpegsPage
function decodeOwnerUpegsPage(hex) {
  const data = hex.replace(/^0x/, "");
  if (data.length < 128) return [];
  // bytes 0..31 = offset (skip), 32..63 = array length
  const len = parseInt(data.slice(64, 128), 16);
  const out = [];
  for (let i = 0; i < len; i++) {
    const base = 128 + i * 128;
    const idHex   = data.slice(base, base + 64);
    const seedHex = data.slice(base + 64, base + 128);
    out.push({ id: Number(BigInt("0x" + idHex)), seed: BigInt("0x" + seedHex).toString() });
  }
  return out;
}

// decode dynamic string returned by generate()
function decodeString(hex) {
  const data = hex.replace(/^0x/, "");
  if (data.length < 128) return "";
  const len = parseInt(data.slice(64, 128), 16);
  const utf8 = data.slice(128, 128 + len * 2);
  let s = "";
  for (let i = 0; i < utf8.length; i += 2) s += String.fromCharCode(parseInt(utf8.slice(i, i + 2), 16));
  return s;
}

// --- RPC ---
let rpcId = 0;
async function call(to, data) {
  const res = await fetch(RPC, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: ++rpcId, method: "eth_call",
                           params: [{ to, data }, "latest"] })
  });
  const j = await res.json();
  if (j.error) throw new Error(j.error.message || JSON.stringify(j.error));
  return j.result;
}
async function pmap(items, n, fn) {
  const out = new Array(items.length);
  let i = 0;
  await Promise.all(Array.from({ length: Math.min(n, items.length) }, async () => {
    while (i < items.length) {
      const k = i++;
      try { out[k] = await fn(items[k], k); }
      catch (e) { out[k] = { _err: String(e) }; }
    }
  }));
  return out;
}

// --- IndexedDB archive ---
const DB_NAME = "upeg-archive", STORE = "unicorns";
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(STORE, { keyPath: "id" });
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function dbGetAll(db) { return new Promise((res, rej) => {
  const tx = db.transaction(STORE, "readonly");
  const r = tx.objectStore(STORE).getAll();
  r.onsuccess = () => res(r.result);
  r.onerror = () => rej(r.error);
}); }
function dbBulkPut(db, items) { return new Promise((res, rej) => {
  const tx = db.transaction(STORE, "readwrite");
  const s = tx.objectStore(STORE);
  for (const it of items) s.put(it);
  tx.oncomplete = res;
  tx.onerror = () => rej(tx.error);
}); }
function dbClear(db) { return new Promise((res, rej) => {
  const tx = db.transaction(STORE, "readwrite");
  tx.objectStore(STORE).clear();
  tx.oncomplete = res;
  tx.onerror = () => rej(tx.error);
}); }

// --- DOM ---
const $status = document.getElementById("status");
const $grid   = document.getElementById("grid");
const $sent   = document.getElementById("sentinel");
const $modal  = document.getElementById("modal");
const $mArt   = document.getElementById("modalArt");
const $mMeta  = document.getElementById("modalMeta");
const $counts = document.getElementById("counts");
const $fAll = document.getElementById("filterAll"),
      $fAlive = document.getElementById("filterAlive"),
      $fBurned = document.getElementById("filterBurned"),
      $export = document.getElementById("export"),
      $clear = document.getElementById("clearCache"),
      $wIn = document.getElementById("walletInput"),
      $wGo = document.getElementById("walletGo"),
      $wClear = document.getElementById("walletClear");

// --- state ---
let db;
let holdersCount = 0, totalEverMinted = 0;
let nextHolderIdx = 0, totalRendered = 0;
let loading = false, scanComplete = false;
const liveAlive = new Set();
const cellsById = new Map();
let filter = "all";
let walletMode = null; // null or lowercased address

function fmtAddr(a) { return a.slice(0,6) + "…" + a.slice(-4); }
function fmtTime(t) { return new Date(t).toLocaleString(); }

let currentModalRecord = null;
function openModal(r) {
  currentModalRecord = r;
  $mArt.innerHTML = r.svg || "";
  $mMeta.innerHTML =
    `<b>uPEG #${r.id}</b> · ${r.status === "burned" ? "🔥 burned" : "alive"}<br>` +
    (r.status === "burned"
      ? `last seen with <a href="https://etherscan.io/address/${r.holder}" target="_blank" rel="noopener">${fmtAddr(r.holder)}</a><br>`
      : `held by <a href="https://etherscan.io/address/${r.holder}" target="_blank" rel="noopener">${fmtAddr(r.holder)}</a><br>`) +
    `seed: <span style="font-size:10px">${r.seed}</span><br>` +
    `first cached: ${fmtTime(r.firstSeenAt)}<br>` +
    `last seen: ${fmtTime(r.lastSeenAt)}`;
  document.getElementById("mintStatus").textContent = "";
  const $mb = document.getElementById("mintBtn");
  $mb.disabled = !r.svg;
  if (!r.svg) {
    $mb.textContent = "no svg cached — can't mint";
  } else if (!COLLECTION_ID) {
    $mb.textContent = `🌱 create uPEG Unicorns collection (genesis mint of #${r.id})`;
    $mb.style.background = "#3d2a48";
    $mb.style.borderColor = "#77443d";
  } else {
    $mb.textContent = `mint #${r.id} into uPEG Unicorns collection`;
    $mb.style.background = "#2a3548";
    $mb.style.borderColor = "#3d5277";
  }
  $modal.classList.add("on");
}

function applyFilter() {
  for (const { div, record } of cellsById.values()) {
    let show =
      filter === "all" ||
      (filter === "alive" && record.status === "alive") ||
      (filter === "burned" && record.status === "burned");
    if (walletMode && record.holder.toLowerCase() !== walletMode) show = false;
    div.classList.toggle("filter-hidden", !show);
  }
}

function refreshCounts() {
  let alive = 0, burned = 0, walletAlive = 0, walletBurned = 0;
  for (const { record } of cellsById.values()) {
    const w = walletMode && record.holder.toLowerCase() === walletMode;
    if (record.status === "alive") { alive++; if (w) walletAlive++; }
    else { burned++; if (w) walletBurned++; }
  }
  if (walletMode) {
    $counts.textContent =
      `wallet: ${walletAlive.toLocaleString()} alive · ${walletBurned.toLocaleString()} archived`;
  } else {
    $counts.textContent =
      `${alive.toLocaleString()} alive · ${burned.toLocaleString()} burned`;
  }
}

function renderCell(record) {
  const existing = cellsById.get(record.id);
  if (existing) {
    existing.record = record;
    existing.div.classList.toggle("burned", record.status === "burned");
    if (record.svg && !existing.div._hasSvg) {
      existing.div.innerHTML = record.svg + `<span class="tag">#${record.id}</span>`;
      existing.div._hasSvg = true;
    }
    return existing.div;
  }
  const div = document.createElement("div");
  div.className = "cell" + (record.svg ? "" : " skeleton") + (record.status === "burned" ? " burned" : "");
  div.dataset.id = record.id;
  div.title = `#${record.id} · ${fmtAddr(record.holder)}`;
  div.innerHTML = (record.svg || "") + `<span class="tag">#${record.id}</span>`;
  div._hasSvg = !!record.svg;
  div.addEventListener("click", () => openModal(record));
  $grid.appendChild(div);
  cellsById.set(record.id, { div, record });
  return div;
}

// --- core scanning ---
async function init() {
  try { db = await openDB(); }
  catch (e) { $status.textContent = "IndexedDB unavailable: " + e.message; return; }

  const cached = await dbGetAll(db);
  cached.sort((a, b) => a.id - b.id);
  $status.textContent = `loading ${cached.length.toLocaleString()} from local archive…`;
  // Render cached items as "alive" (unverified). Live scan will confirm or
  // flip to "burned" once it finishes. This avoids a sea of false-positive 🔥
  // badges before the scan reaches their holders.
  for (const c of cached) renderCell({ ...c, status: "alive" });
  refreshCounts();

  try {
    const [hcRaw, totalRaw] = await Promise.all([
      call(TOKEN, SEL.HoldersCount),
      call(TOKEN, SEL.UpegsTotalCount)
    ]);
    holdersCount    = Number(decodeUint(hcRaw));
    totalEverMinted = Number(decodeUint(totalRaw));
  } catch (e) {
    $status.textContent = "header RPC failed: " + e.message;
    return;
  }
  $status.textContent =
    `${holdersCount.toLocaleString()} holders · ${totalEverMinted.toLocaleString()} unicorns ever minted · ${cached.length.toLocaleString()} in local archive`;

  // initial hash route
  const hash = location.hash.match(/wallet=(0x[0-9a-fA-F]{40})/);
  if (hash) { $wIn.value = hash[1]; await openWallet(hash[1]); }
  else await loadMore();
}

async function loadMore() {
  if (loading || scanComplete || walletMode) return;
  if (holdersCount === 0) return;  // init hasn't loaded header yet — IO race guard
  loading = true;
  const startCount = totalRendered;

  try {
    while (totalRendered - startCount < PAGE_TARGET && nextHolderIdx < holdersCount) {
      const sliceEnd = Math.min(nextHolderIdx + HOLDER_BATCH, holdersCount);
      const idxs = Array.from({ length: sliceEnd - nextHolderIdx }, (_, k) => nextHolderIdx + k);
      nextHolderIdx = sliceEnd;
      $status.textContent =
        `${totalRendered} new · holders ${idxs[0]}…${idxs[idxs.length-1]} of ${holdersCount}`;

      const holders = (await pmap(idxs, HOLDER_BATCH, async i =>
        decodeAddress(await call(TOKEN, callHolder(i)))
      )).filter(a => typeof a === "string" && /^0x[0-9a-f]{40}$/i.test(a)
                     && a !== "0x0000000000000000000000000000000000000000");
      if (holders.length === 0) continue;

      const pages = await pmap(holders, HOLDER_BATCH, async h =>
        decodeOwnerUpegsPage(await call(TOKEN, callOwnerUpegsPage(h, 0, 100)))
      );

      const pairs = [];
      for (let i = 0; i < holders.length; i++) {
        const arr = pages[i];
        if (!arr || arr._err) continue;
        for (const u of arr) pairs.push({ id: u.id, seed: u.seed, holder: holders[i] });
      }
      if (pairs.length === 0) continue;

      const now = Date.now();
      for (const p of pairs) liveAlive.add(p.id);

      const needSvg = pairs.filter(p => {
        const ex = cellsById.get(p.id);
        return !ex || !ex.record.svg;
      });
      const svgs = await pmap(needSvg, HOLDER_BATCH, async p => {
        try { return decodeString(await call(HOOK, callGenerate(p.seed))); }
        catch { return null; }
      });
      const svgById = new Map();
      needSvg.forEach((p, i) => svgById.set(p.id, svgs[i]));

      const toCache = [];
      for (const p of pairs) {
        const ex = cellsById.get(p.id);
        const svg = ex?.record?.svg || svgById.get(p.id);
        const record = {
          id: p.id, seed: p.seed, svg, holder: p.holder,
          status: "alive",
          firstSeenAt: ex?.record?.firstSeenAt || now,
          lastSeenAt: now
        };
        renderCell(record);
        if (!ex || ex.record.status !== "alive" || ex.record.holder !== p.holder) toCache.push(record);
      }
      if (toCache.length) await dbBulkPut(db, toCache);

      totalRendered += pairs.length;
      refreshCounts();
      applyFilter();
    }
  } catch (e) {
    $status.textContent = "scan error: " + e.message;
    loading = false;
    return;
  }

  if (nextHolderIdx >= holdersCount && !scanComplete) {
    scanComplete = true;
    const burnedNow = [];
    for (const [id, { record }] of cellsById) {
      if (!liveAlive.has(id) && record.status !== "burned") {
        record.status = "burned";
        burnedNow.push({ ...record, status: "burned" });
      }
    }
    if (burnedNow.length) await dbBulkPut(db, burnedNow);
    for (const { div, record } of cellsById.values())
      div.classList.toggle("burned", record.status === "burned");
    refreshCounts();
    applyFilter();
    $sent.textContent = `✓ scan complete — ${liveAlive.size.toLocaleString()} alive · ${cellsById.size - liveAlive.size} burned in archive`;
  } else {
    $status.textContent =
      `${liveAlive.size.toLocaleString()} alive seen · ${holdersCount - nextHolderIdx} holders left`;
  }
  loading = false;
}

// --- wallet lookup ---
async function openWallet(addr) {
  addr = addr.trim().toLowerCase();
  if (!/^0x[0-9a-f]{40}$/.test(addr)) {
    $status.textContent = "invalid address";
    return;
  }
  walletMode = addr;
  $wClear.style.display = "";
  location.hash = "wallet=" + addr;
  $sent.textContent = `wallet view — fetching live state for ${fmtAddr(addr)}…`;

  // 1. live: paginate everything they currently own
  const now = Date.now();
  let page = 0, fetched = 0;
  const live = [];
  while (true) {
    let arr;
    try { arr = decodeOwnerUpegsPage(await call(TOKEN, callOwnerUpegsPage(addr, page, 100))); }
    catch (e) { $status.textContent = "wallet RPC error: " + e.message; break; }
    if (arr.length === 0) break;
    live.push(...arr);
    if (arr.length < 100) break;
    page++;
    if (page > 100) break;
  }

  // 2. fetch SVGs we don't already have
  const need = live.filter(u => {
    const ex = cellsById.get(u.id);
    return !ex || !ex.record.svg;
  });
  const svgs = await pmap(need, HOLDER_BATCH, async u => {
    try { return decodeString(await call(HOOK, callGenerate(u.seed))); }
    catch { return null; }
  });
  const svgById = new Map();
  need.forEach((u, i) => svgById.set(u.id, svgs[i]));

  // 3. render alive ones
  const toCache = [];
  for (const u of live) {
    const ex = cellsById.get(u.id);
    const svg = ex?.record?.svg || svgById.get(u.id);
    const record = {
      id: u.id, seed: u.seed, svg, holder: addr,
      status: "alive",
      firstSeenAt: ex?.record?.firstSeenAt || now,
      lastSeenAt: now
    };
    renderCell(record);
    toCache.push(record);
  }
  if (toCache.length) await dbBulkPut(db, toCache);

  refreshCounts();
  applyFilter();
  $sent.textContent =
    `wallet ${fmtAddr(addr)} — ${live.length} currently held · scroll for archive`;
}

function exitWallet() {
  walletMode = null;
  $wClear.style.display = "none";
  $wIn.value = "";
  history.replaceState(null, "", location.pathname);
  refreshCounts();
  applyFilter();
  if (!scanComplete) loadMore();
}

// --- toolbar ---
function setFilter(name) {
  filter = name;
  for (const b of [$fAll, $fAlive, $fBurned]) b.classList.remove("on");
  ({ all: $fAll, alive: $fAlive, burned: $fBurned })[name].classList.add("on");
  applyFilter();
}
$fAll.onclick = () => setFilter("all");
$fAlive.onclick = () => setFilter("alive");
$fBurned.onclick = () => setFilter("burned");

$export.onclick = async () => {
  const all = await dbGetAll(db);
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `upeg-archive-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

$clear.onclick = async () => {
  if (!confirm("delete all cached unicorns from this browser?")) return;
  await dbClear(db);
  for (const { div } of cellsById.values()) div.remove();
  cellsById.clear();
  liveAlive.clear();
  scanComplete = false;
  nextHolderIdx = 0;
  totalRendered = 0;
  refreshCounts();
  $sent.textContent = "scroll for more";
  if (!walletMode) await loadMore();
};

$wGo.onclick = () => openWallet($wIn.value);
$wIn.addEventListener("keydown", e => { if (e.key === "Enter") openWallet($wIn.value); });
$wClear.onclick = exitWallet;

// --- mint as ethscription (with AppChain collection) ---
// Two paths:
//   1) ETHSCRIBER_CONTRACT == null → EOA self-tx, calldata = hex(dataURI), zero fee
//   2) ETHSCRIBER_CONTRACT set     → call mint(string) on the contract with msg.value=mintFee
//                                    contract emits ESIP-3 event, forwards fee, refunds excess
// Genesis 2 — sent server-side via cast after the first one (0xa5fca28f...) was
// rejected by the AppChain parser for a 63-char merkle_root. This one is
// verified byte-exact on chain: 64-char merkle_root, regex matches, item #19125.
const COLLECTION_ID = "0x7d2154a90ce8def4fa18f66d1095ae2b147faf17705eb2a90caf50579589a5a7";
const COLLECTION_PROTOCOL = "erc-721-ethscriptions-collection";
// On-chain ethscriber: builds the AppChain Data URI in Solidity so calldata
// stays tiny (~64 bytes for upegId + seed). Required because Phantom-EVM
// rejects mint(string) calls with multi-KB string args.
const ETHSCRIBER_CONTRACT = "0x7ccbbc0f74643a6cb52bc5c7c40eade687f1d914";
const ETHSCRIBER_SEL = {
  currentPrice: "0x9d1b464a",   // currentPrice()
  mint:         "0x1b2ef1ca"    // mint(uint256,uint256) — (upegId, seed)
};

// utf-8 → hex
function strToHex(s) {
  const bytes = new TextEncoder().encode(s);
  let out = "";
  for (const b of bytes) out += b.toString(16).padStart(2, "0");
  return out;
}

// base64 of an svg/string (handles unicode)
function utf8ToB64(s) { return btoa(unescape(encodeURIComponent(s))); }

// JSON → base64 with strict insertion-order key preservation (the parser is picky).
// Use utf-8 bytes path so any non-Latin1 chars (em-dash etc.) don't break btoa.
function jsonToB64(obj) { return utf8ToB64(JSON.stringify(obj)); }

// SHA-256 of a string (hex output) — for uniqueness pre-check
async function sha256Hex(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}

// ---- collection payload builders (KEY ORDER MATTERS — parser rejects reorders) ----
function buildItemJson(record) {
  return {
    item_index:        record.id,
    name:              `uPEG #${record.id}`,
    background_color:  "0b0c10",
    description:       `uPEG unicorn #${record.id}. On-chain SVG, deterministic from seed.`,
    attributes: [
      { trait_type: "upeg_id", value: String(record.id) },
      { trait_type: "seed",    value: String(record.seed) }
    ],
    merkle_proof: []
  };
}

function buildCreateCollectionPayload(record) {
  return {
    metadata: {
      name:             "uPEG Unicorns",
      symbol:           "UPEG",
      max_supply:       "1000000",
      description:      "Ethscribed uPEG unicorns. Each one a 24×24 on-chain SVG from 0x44b28991b167582f18ba0259e0173176ca125505.",
      logo_image_uri:   "",
      banner_image_uri: "",
      background_color: "0b0c10",
      website_link:     "https://unipeg.vercel.app/upeg",
      twitter_link:     "",
      discord_link:     "",
      merkle_root:      "0x" + "0".repeat(64),  // bytes32(0) — always 64 hex chars
      initial_owner:    "0x0000000000000000000000000000000000000000"
    },
    item: buildItemJson(record)
  };
}

function buildAddPayload(record, collectionId) {
  return { collection_id: collectionId, item: buildItemJson(record) };
}

// ABI-encode `mint(uint256,uint256)` call. Two static uints, no offsets.
function encodeMintCalldata(upegId, seedStr) {
  return "0x1b2ef1ca"
    + pad32(BigInt(upegId).toString(16))
    + pad32(BigInt(seedStr).toString(16));
}

// Build a header-form Data URI: data:<media>;p=<protocol>;op=<operation>;d=<b64-json>;base64,<b64-svg>
function buildCollectionDataURI(svg, op, payload) {
  const parts = [
    "image/svg+xml",
    `p=${COLLECTION_PROTOCOL}`,
    `op=${op}`,
    `d=${jsonToB64(payload)}`,
    "base64"
  ];
  return `data:${parts.join(";")},` + utf8ToB64(svg);
}

// EIP-6963 wallet discovery — collects every wallet that announces itself.
const announcedWallets = [];
window.addEventListener("eip6963:announceProvider", e => {
  announcedWallets.push(e.detail);
});
window.dispatchEvent(new Event("eip6963:requestProvider"));

// Try every installed provider in turn until one returns accounts.
// Phantom-EVM frequently throws -32603 on eth_requestAccounts when its EVM
// mode isn't enabled — but if the user has another wallet installed too
// (MetaMask, Rabby, Coinbase), this falls through to it instead of dying.
function listAllWallets() {
  const candidates = [];
  for (const w of announcedWallets) candidates.push({ provider: w.provider, name: w.info?.name || providerName(w.provider) });
  if (Array.isArray(window.ethereum?.providers)) {
    for (const p of window.ethereum.providers) candidates.push({ provider: p, name: providerName(p) });
  } else if (window.ethereum) {
    candidates.push({ provider: window.ethereum, name: providerName(window.ethereum) });
  }
  // Phantom-specific direct injection (sometimes works when window.ethereum proxy doesn't)
  if (window.phantom?.ethereum) {
    candidates.push({ provider: window.phantom.ethereum, name: "Phantom (direct)" });
  }
  const seen = new Set(); const uniq = [];
  for (const c of candidates) { if (!seen.has(c.provider)) { seen.add(c.provider); uniq.push(c); } }
  return uniq;
}

// Lazy wallet picker — opens a tiny inline picker if >1 wallet, else uses the only one
let _chosenWallet = null;
async function pickWallet() {
  if (_chosenWallet) return _chosenWallet;
  const wallets = listAllWallets();
  if (wallets.length === 0) throw new Error("no wallet detected — install MetaMask, Rabby, Phantom, Rainbow, etc.");
  if (wallets.length === 1) {
    const accounts = await wallets[0].provider.request({ method: "eth_requestAccounts" });
    _chosenWallet = { provider: wallets[0].provider, name: wallets[0].name, account: accounts[0] };
    return _chosenWallet;
  }
  // Show picker
  return new Promise((resolve, reject) => {
    const picker = document.createElement("div");
    picker.style.cssText = "position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;z-index:20;padding:20px";
    picker.innerHTML = `<div style="background:#16181d;border-radius:6px;padding:18px;max-width:340px;width:100%">
      <div style="font-size:14px;color:#fff;margin-bottom:4px">choose wallet</div>
      <div style="font-size:11px;color:#888;margin-bottom:12px">${wallets.length} detected</div>
      ${wallets.map((w,i) => `<button data-idx="${i}" style="display:block;width:100%;text-align:left;background:#1d2026;color:#e8e8e8;border:1px solid #2a2e36;padding:10px 14px;border-radius:3px;font:inherit;font-size:13px;cursor:pointer;margin-bottom:6px">${w.name}</button>`).join("")}
      <button id="pickerCancel" style="display:block;width:100%;background:transparent;color:#888;border:none;padding:8px;font:inherit;font-size:11px;cursor:pointer;margin-top:6px">cancel</button>
    </div>`;
    document.body.appendChild(picker);
    picker.addEventListener("click", async (ev) => {
      if (ev.target.id === "pickerCancel" || ev.target === picker) {
        picker.remove(); reject(new Error("user cancelled wallet pick"));
      } else if (ev.target.dataset.idx != null) {
        const w = wallets[+ev.target.dataset.idx];
        picker.remove();
        try {
          const accounts = await w.provider.request({ method: "eth_requestAccounts" });
          _chosenWallet = { provider: w.provider, name: w.name, account: accounts[0] };
          resolve(_chosenWallet);
        } catch (e) { reject(e); }
      }
    });
  });
}
function providerName(p) {
  if (p.isMetaMask) return "MetaMask";
  if (p.isRabby) return "Rabby";
  if (p.isRainbow) return "Rainbow";
  if (p.isCoinbaseWallet) return "Coinbase";
  if (p.isPhantom) return "Phantom";
  return "Wallet";
}

async function mintEthscription() {
  const r = currentModalRecord;
  const $btn = document.getElementById("mintBtn");
  const $st = document.getElementById("mintStatus");
  if (!r || !r.svg) { $st.textContent = "no svg cached — open a unicorn the gallery has fetched"; return; }
  if (!window.ethereum && announcedWallets.length === 0) {
    $st.textContent = "no wallet detected — install MetaMask, Rabby, Rainbow, etc.";
    return;
  }

  const isGenesis = !COLLECTION_ID;
  const op = isGenesis ? "create_collection_and_add_self" : "add_self_to_collection";
  const payload = isGenesis
    ? buildCreateCollectionPayload(r)
    : buildAddPayload(r, COLLECTION_ID);

  $btn.disabled = true;
  try {
    const dataURI = buildCollectionDataURI(r.svg, op, payload);

    // uniqueness pre-check by SHA256 of the full Data URI
    $st.textContent = "checking if this unicorn is already ethscribed…";
    try {
      const sha = await sha256Hex(dataURI);
      const existsRes = await fetch(`https://api.ethscriptions.com/v2/ethscriptions/exists/${sha}`);
      const existsJson = await existsRes.json();
      if (existsJson?.result?.exists) {
        const existing = existsJson.result.ethscription;
        $st.innerHTML =
          `already ethscribed → <a href="https://ethscriptions.com/ethscriptions/${existing.transaction_hash}" target="_blank" rel="noopener">view it</a>`;
        $btn.disabled = false;
        return;
      }
    } catch (_) { /* non-fatal */ }

    $st.textContent = "connecting wallet…";
    const conn = await pickWallet();
    const wallet = conn.provider;
    const from = conn.account;
    $st.textContent = `connected via ${conn.name}`;

    const chainId = await wallet.request({ method: "eth_chainId" });
    if (chainId !== "0x1") {
      $st.textContent = `switching ${conn.name} to Ethereum mainnet…`;
      try {
        await wallet.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: "0x1" }]
        });
      } catch (e) {
        $st.textContent = "please switch your wallet to Ethereum mainnet";
        $btn.disabled = false;
        return;
      }
    }

    // Build tx params — either EOA self-tx or contract call.
    let txParams;
    if (ETHSCRIBER_CONTRACT && !isGenesis) {
      // contract path: tiny calldata (upegId + seed only). Contract builds the
      // Data URI on-chain and emits the ESIP-3 event. Phantom-friendly.
      $st.textContent = "checking price + balance…";
      const [priceHex, balHex, feeHistory] = await Promise.all([
        call(ETHSCRIBER_CONTRACT, ETHSCRIBER_SEL.currentPrice),
        // eth_getBalance via the proxy
        fetch(RPC, { method:"POST", headers:{"content-type":"application/json"},
          body: JSON.stringify({ jsonrpc:"2.0", id:++rpcId, method:"eth_getBalance",
                                  params:[from, "latest"] }) }).then(r=>r.json()).then(j=>j.result),
        // get current base fee for explicit EIP-1559 fee setting
        fetch(RPC, { method:"POST", headers:{"content-type":"application/json"},
          body: JSON.stringify({ jsonrpc:"2.0", id:++rpcId, method:"eth_feeHistory",
                                  params:["0x1","latest",[50]] }) }).then(r=>r.json()).then(j=>j.result)
      ]);
      const price = BigInt(priceHex);
      const bal   = BigInt(balHex || "0x0");
      const baseFee = BigInt(feeHistory?.baseFeePerGas?.[0] || "0x1");
      const tip    = BigInt(2_000_000_000); // 2 gwei tip (generous for fast inclusion)
      const maxFee = baseFee * 2n + tip;
      const gasLimit = 3_000_000n;
      const totalCost = price + maxFee * gasLimit;
      if (bal < totalCost) {
        const need = Number(totalCost) / 1e18;
        const have = Number(bal) / 1e18;
        $st.textContent = `wallet has ${have.toFixed(6)} ETH, mint needs ~${need.toFixed(6)} ETH (price + max gas). top up and retry.`;
        $btn.disabled = false;
        return;
      }
      txParams = {
        from,
        to: ETHSCRIBER_CONTRACT,
        value: "0x" + price.toString(16),
        data: encodeMintCalldata(r.id, r.seed),
        gas: "0x" + gasLimit.toString(16),
        // Explicit EIP-1559 fees so wallets don't have to derive them. Some
        // wallets (notably Phantom-EVM) return -32603 if their internal fee
        // derivation has any hiccup; pre-setting bypasses that.
        maxFeePerGas:         "0x" + maxFee.toString(16),
        maxPriorityFeePerGas: "0x" + tip.toString(16)
      };
      $st.textContent = `signing…`;
    } else {
      // EOA path: zero-value self-tx, calldata = hex(dataURI). Used for genesis
      // (the contract can't mint a collection genesis on someone else's behalf since
      // the L1 indexer treats the contract address as a different actor) and for
      // the no-contract fallback.
      const data = "0x" + strToHex(dataURI);
      const kb = (data.length / 2 / 1024).toFixed(1);
      // Note: omit `value` field entirely (some wallets choke on "0x0"). Default = 0.
      txParams = { from, to: from, data };
      $st.textContent = isGenesis
        ? `signing GENESIS tx (creates the uPEG Unicorns collection + inscribes #${r.id} as item 1) — ${kb} KB calldata`
        : `signing tx (mints uPEG #${r.id} into the collection, no fee) — ${kb} KB calldata`;
    }

    console.log("[upeg-mint] sending tx", txParams);
    const txHash = await wallet.request({
      method: "eth_sendTransaction",
      params: [txParams]
    });

    if (isGenesis) {
      $st.innerHTML =
        `<b>genesis tx sent</b> → <a href="https://etherscan.io/tx/${txHash}" target="_blank" rel="noopener">etherscan</a><br>` +
        `once mined this becomes the COLLECTION_ID. Save it: <code>${txHash}</code><br>` +
        `then update <code>COLLECTION_ID</code> in <code>site/upeg/index.html</code> and push.<br>` +
        `view: <a href="https://ethscriptions.com/ethscriptions/${txHash}" target="_blank" rel="noopener">ethscriptions.com/${txHash.slice(0,10)}…</a>`;
      console.log("UPEG_COLLECTION_GENESIS_TXHASH=" + txHash);
    } else {
      $st.innerHTML =
        `tx sent → <a href="https://etherscan.io/tx/${txHash}" target="_blank" rel="noopener">etherscan</a><br>` +
        `once mined: <a href="https://ethscriptions.com/ethscriptions/${txHash}" target="_blank" rel="noopener">ethscriptions.com/${txHash.slice(0,10)}…</a>`;
    }
  } catch (e) {
    console.error("[upeg-mint] error:", e);
    const detail = e?.data?.message || e?.cause?.message || e?.message || String(e);
    const code = e?.code != null ? ` (code ${e.code})` : "";
    $st.textContent = `mint failed: ${detail}${code}`;
  } finally {
    $btn.disabled = false;
  }
}
document.getElementById("mintBtn").onclick = mintEthscription;
document.getElementById("resetWallet").onclick = () => {
  _chosenWallet = null;
  document.getElementById("mintStatus").textContent = "wallet cleared — click mint to choose again";
};

// --- scroll ---
const io = new IntersectionObserver(es => { if (es.some(e => e.isIntersecting)) loadMore(); },
                                    { rootMargin: "400px 0px" });
io.observe($sent);

init().catch(e => { $status.textContent = "init error: " + e.message; });
</script>
